<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Empire | Bot Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <nav class="sidebar">
            <div class="logo">
                <i class="fas fa-microchip"></i>
                <span>DARK EMPIRE</span>
            </div>
            <ul class="nav-links">
                <li class="active" data-tab="dashboard"><i class="fas fa-th-large"></i> Dashboard</li>
                <li data-tab="audio"><i class="fas fa-music"></i> Audio Library</li>
                <li data-tab="settings"><i class="fas fa-sliders"></i> Global Controls</li>
                <li data-tab="users" id="tab-link-users" style="display: none;"><i class="fas fa-users"></i> User Manager</li>
                <li data-tab="logs"><i class="fas fa-terminal"></i> Live Logs</li>
                <li onclick="window.location.href='/api/logout'"><i class="fas fa-sign-out-alt"></i> Logout</li>
            </ul>
            <div class="system-stats">
                <div class="stat-item">
                    <span>CPU</span>
                    <div class="progress"><div id="cpu-bar" style="width: 0%"></div></div>
                </div>
                <div class="stat-item">
                    <span>MEM</span>
                    <div class="progress"><div id="mem-bar" style="width: 0%"></div></div>
                </div>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="content">
            <!-- Header -->
            <header>
                <div class="search-box">
                    <i class="fas fa-link"></i>
                    <input type="text" id="vc-input" placeholder="Paste Channel ID here (Right-click Channel > Copy ID)">
                    <button id="join-btn" class="btn-primary">JOIN VC</button>
                    <button id="leave-btn" class="btn-danger">LEAVE ALL</button>
                </div>
                <div class="user-info">
                    <span id="global-status" class="status-badge offline">OFFLINE</span>
                </div>
            </header>

            <!-- Tabs -->
            <div id="tab-dashboard" class="tab-content active">
                <div class="section-title">
                    <h2>Bot Fleet <span id="bot-count">(0/10)</span></h2>
                </div>
                <div class="bot-grid" id="bot-grid">
                    <!-- Bot cards injected here -->
                </div>
            </div>

            <div id="tab-audio" class="tab-content">
                <div class="section-title">
                    <h2>Audio Library</h2>
                    <label class="btn-secondary">
                        <i class="fas fa-upload"></i> Upload MP3
                        <input type="file" id="audio-upload" hidden accept=".mp3">
                    </label>
                </div>
                <div class="audio-list" id="audio-list">
                    <!-- Audio items injected here -->
                </div>
            </div>

            <div id="tab-settings" class="tab-content">
                <div class="section-title"><h2>Global Audio Processor</h2></div>
                <div class="settings-grid">
                    <div class="card control-card">
                        <label><i class="fas fa-volume-high"></i> Master Volume <span id="vol-val">100%</span></label>
                        <input type="range" id="range-vol" min="0" max="1000" value="100">
                    </div>
                    <div class="card control-card">
                        <label><i class="fas fa-drum"></i> Bass Boost <span id="bass-val">0dB</span></label>
                        <input type="range" id="range-bass" min="0" max="100" value="0">
                    </div>
                    <div class="card control-card">
                        <label><i class="fas fa-gauge"></i> Playback Speed <span id="speed-val">1.0x</span></label>
                        <input type="range" id="range-speed" min="0.5" max="2.0" step="0.1" value="1.0">
                    </div>
                    <div class="card control-card">
                        <label><i class="fas fa-repeat"></i> Loop Playback</label>
                        <div class="toggle-btn" id="toggle-loop">
                            <div class="circle"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="tab-users" class="tab-content">
                <div class="section-title">
                    <h2>User Management</h2>
                </div>
                <div class="settings-grid">
                    <div class="card control-card">
                        <label>Add New User</label>
                        <input type="text" id="new-username" placeholder="Username" style="background: rgba(0,0,0,0.3); border: 1px solid var(--border); padding: 10px; border-radius: 8px; color: white; margin-bottom: 10px;">
                        <input type="password" id="new-password" placeholder="Password" style="background: rgba(0,0,0,0.3); border: 1px solid var(--border); padding: 10px; border-radius: 8px; color: white; margin-bottom: 10px;">
                        <button id="add-user-btn" class="btn-primary">ADD USER</button>
                    </div>
                    <div class="card control-card" style="grid-column: span 2;">
                        <label>Authorized Users</label>
                        <div id="user-list" class="audio-list" style="margin-top: 10px;">
                            <!-- Users injected here -->
                        </div>
                    </div>
                </div>
            </div>

            <div id="tab-logs" class="tab-content">
                <div class="section-title">
                    <h2>Console Output</h2>
                    <button id="clear-logs" class="btn-small">CLEAR</button>
                </div>
                <div class="log-container" id="log-console"></div>
            </div>

            <!-- Fixed Playback Bar -->
            <div class="audio-controls-bar">
                <div class="now-playing">
                    <i class="fas fa-compact-disc fa-spin"></i>
                    <span id="current-track-name">No Audio Playing</span>
                </div>
                <div class="playback-btns">
                    <button id="rewind-btn" title="Rewind 15s"><i class="fas fa-undo"></i></button>
                    <button id="stop-all-btn" class="btn-danger" title="Stop All"><i class="fas fa-stop"></i></button>
                    <button id="forward-btn" title="Skip 15s"><i class="fas fa-redo"></i></button>
                </div>
            </div>
        </main>
    </div>

    <!-- Notification Toast -->
    <div id="toast" class="toast"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js"></script>
</body>
</html>
